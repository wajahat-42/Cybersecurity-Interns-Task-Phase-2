# Fail2Ban filter for SecureNotes API
# Matches failed login attempts in Morgan's "combined" log format
# Place this file at: /etc/fail2ban/filter.d/secure-notes.conf

[Definition]
# Match IPs that get 401 on the login endpoint
# Morgan combined format: IP - - [date] "METHOD PATH HTTP/ver" STATUS bytes
failregex = ^<HOST> .* "POST /api/auth/login HTTP/.*" 401 .*$

ignoreregex =

[Init]
# Log timestamp format used by Morgan
datepattern = %%d/%%b/%%Y:%%H:%%M:%%S %%z
